[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
goat_testnet = "${GOAT_TESTNET_RPC_URL}"
anvil        = "http://127.0.0.1:8545"

